name: Rust Setup
description: Install Linux deps, setup Rust toolchain, and cache cargo.

inputs:
  components:
    description: Comma-separated Rust components to install.
    required: false
    default: ""
  linux-packages:
    description: Space-separated Linux packages.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: step::install_linux_dependencies
      if: runner.os == 'Linux' && inputs.linux-packages != ''
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y ${{ inputs.linux-packages }}

    - name: step::setup_rust_with_components
      if: inputs.components != ''
      uses: dtolnay/rust-toolchain@stable
      with:
        components: ${{ inputs.components }}

    - name: step::setup_rust
      if: inputs.components == ''
      uses: dtolnay/rust-toolchain@stable

    - name: step::cache_cargo
      uses: Swatinem/rust-cache@v2
