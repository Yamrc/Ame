name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  LINUX_PACKAGES: pkg-config libdbus-1-dev libasound2-dev libudev-dev libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libx11-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libegl1-mesa-dev libfontconfig1-dev libfreetype6-dev libglib2.0-dev
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  lint:
    name: Check And Clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Rust environment
        uses: ./.github/actions/rust-setup
        with:
          with-clippy: "true"
          linux-packages: ${{ env.LINUX_PACKAGES }}

      - name: Cargo check and clippy
        run: |
          cargo check -q --workspace
          cargo clippy --workspace --all-targets -- -D warnings

  build:
    name: Build ${{ matrix.os }}
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux-x86_64
            bin_name: ame
            portable_name: ame-linux-x86_64
            installer_name: ame-linux-x86_64.deb
            installer_glob: ame-linux-x86_64.deb
          - os: windows-latest
            artifact_suffix: windows-x86_64
            bin_name: ame.exe
            portable_name: ame-windows-x86_64.exe
            installer_name: ame-windows-x86_64-en-US.msi
            installer_glob: ame-windows-x86_64-*.msi
          - os: macos-latest
            artifact_suffix: macos-arm64
            bin_name: ame
            portable_name: ame-macos-arm64
            installer_name: ame-macos-arm64.pkg
            installer_glob: ame-macos-arm64.pkg

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Rust environment
        uses: ./.github/actions/rust-setup
        with:
          linux-packages: ${{ env.LINUX_PACKAGES }}

      - name: Cargo build release
        run: cargo build --release -p ame

      - name: Resolve app version
        shell: pwsh
        run: |
          $version = ((cargo pkgid -p ame).Trim() -replace '.*@', '')
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prepare portable package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/release/${{ matrix.bin_name }}" "dist/${{ matrix.portable_name }}"

      - name: Build DEB installer
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist/pkgroot
          mkdir -p dist/pkgroot/DEBIAN dist/pkgroot/usr/bin
          install -m 0755 target/release/ame dist/pkgroot/usr/bin/ame
          cat > dist/pkgroot/DEBIAN/control <<EOF
          Package: ame
          Version: ${APP_VERSION}
          Section: sound
          Priority: optional
          Architecture: amd64
          Maintainer: Yamrc <yamrci@outlook.com>
          Description: Ame music client
          EOF
          dpkg-deb --build dist/pkgroot "dist/${{ matrix.installer_name }}"

      - name: Build MSI installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install wixtoolset --yes --no-progress
          $sourceExe = (Resolve-Path "target/release/ame.exe").Path
          $wixobj = "$env:RUNNER_TEMP/ame.wixobj"
          candle.exe -ext WixUIExtension "-dSourceExe=$sourceExe" "-dProductVersion=$env:APP_VERSION" -out "$wixobj" "packaging/windows/ame.wxs"
          light.exe -ext WixUIExtension -loc "packaging/windows/en-us.wxl" -out "dist/ame-windows-x86_64-en-US.msi" "$wixobj"
          light.exe -ext WixUIExtension -loc "packaging/windows/zh-cn.wxl" -out "dist/ame-windows-x86_64-zh-CN.msi" "$wixobj"

      - name: Build PKG installer
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist/pkgroot
          mkdir -p dist/pkgroot/usr/local/bin
          install -m 0755 target/release/ame dist/pkgroot/usr/local/bin/ame
          pkgbuild \
            --root dist/pkgroot \
            --identifier com.yamrc.ame \
            --version "${APP_VERSION}" \
            --install-location / \
            "dist/${{ matrix.installer_name }}"

      - name: Generate SHA1 files
        shell: pwsh
        run: |
          Get-ChildItem -Path dist -File | Where-Object { $_.Name -notlike "*.sha1" } | ForEach-Object {
            $hash = (Get-FileHash -Path $_.FullName -Algorithm SHA1).Hash.ToLower()
            "$hash  $($_.Name)" | Out-File -FilePath "$($_.FullName).sha1" -Encoding ascii
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ame-${{ matrix.artifact_suffix }}
          path: |
            dist/${{ matrix.portable_name }}
            dist/${{ matrix.portable_name }}.sha1
            dist/${{ matrix.installer_glob }}
            dist/*.sha1
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ame-*
          path: dist
          merge-multiple: true

      - name: Resolve changelog range
        id: changelog_range
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          prev_tag="$(git for-each-ref --sort=-creatordate --format='%(refname:strip=2)' refs/tags | grep -vx "$RELEASE_TAG" | head -n1 || true)"
          if [ -n "$prev_tag" ]; then
            echo "from_ref=$prev_tag" >> "$GITHUB_OUTPUT"
          else
            root_commit="$(git rev-list --max-parents=0 "$RELEASE_TAG" | tail -n1)"
            echo "from_ref=$root_commit" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          mode: COMMIT
          toTag: ${{ env.RELEASE_TAG }}
          fromTag: ${{ steps.changelog_range.outputs.from_ref }}
          configurationJson: |
            {
              "template": "## What's Changed\n#{{CHANGELOG}}\n\n**Full Changelog**: #{{RELEASE_DIFF}}",
              "empty_template": "No significant changes.",
              "categories": [
                {
                  "title": "✨ Features",
                  "labels": ["feat", "Feat"]
                },
                {
                  "title": "🐛 Fixes",
                  "labels": ["fix", "Fix"]
                },
                {
                  "title": "♻️ Refactors",
                  "labels": ["refactor", "Refactor"]
                },
                {
                  "title": "⚡ Performance",
                  "labels": ["perf", "Perf"]
                },
                {
                  "title": "📝 Docs",
                  "labels": ["docs", "Docs"]
                },
                {
                  "title": "🔧 Chore & CI",
                  "labels": ["chore", "ci", "Chore", "CI"]
                },
                {
                  "title": "📦 Other",
                  "labels": []
                }
              ],
              "label_extractor": [
                {
                  "pattern": "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\\([^\\)]*\\))?(!)?:[\\s\\S]*$",
                  "flags": "giu",
                  "target": "$1",
                  "on_property": "title"
                }
              ],
              "commit_template": "- #{{TITLE}} #{{MERGE_SHA}} @#{{AUTHOR}}",
              "sort": {
                "order": "DESC",
                "on_property": "mergedAt"
              }
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build final release body
        shell: bash
        run: |
          set -euo pipefail
          {
            printf '%s\n' "${{ steps.changelog.outputs.changelog }}"
            echo
            echo "## Contributors (by commit)"
            if ! git shortlog -sne "${{ steps.changelog_range.outputs.from_ref }}..${{ env.RELEASE_TAG }}" | sed 's/^/- /'; then
              echo "- No contributors found."
            fi
          } > release-notes.md

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
          files: dist/*
