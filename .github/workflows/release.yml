name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  checks:
    uses: ./.github/workflows/reusable-checks.yml
    with:
      checkout_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

  build:
    needs: checks
    uses: ./.github/workflows/reusable-build.yml
    with:
      checkout_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      include_installers: true
      upload_artifacts: true

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: step::checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: step::download_artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ame-*
          path: dist
          merge-multiple: true

      - name: step::resolve_changelog_range
        id: changelog_range
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          prev_tag="$(git for-each-ref --sort=-creatordate --format='%(refname:strip=2)' refs/tags | grep -vx "$RELEASE_TAG" | head -n1 || true)"
          if [ -n "$prev_tag" ]; then
            echo "from_ref=$prev_tag" >> "$GITHUB_OUTPUT"
          else
            root_commit="$(git rev-list --max-parents=0 "$RELEASE_TAG" | tail -n1)"
            echo "from_ref=$root_commit" >> "$GITHUB_OUTPUT"
          fi

      - name: step::generate_release_notes
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          mode: COMMIT
          toTag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          fromTag: ${{ steps.changelog_range.outputs.from_ref }}
          configurationJson: |
            {
              "template": "## What's Changed\n#{{CHANGELOG}}\n\n**Full Changelog**: #{{RELEASE_DIFF}}",
              "empty_template": "No significant changes.",
              "categories": [
                {
                  "title": "✨ Features",
                  "labels": ["feat", "Feat"]
                },
                {
                  "title": "🐛 Fixes",
                  "labels": ["fix", "Fix"]
                },
                {
                  "title": "♻️ Refactors",
                  "labels": ["refactor", "Refactor"]
                },
                {
                  "title": "⚡ Performance",
                  "labels": ["perf", "Perf"]
                },
                {
                  "title": "📝 Docs",
                  "labels": ["docs", "Docs"]
                },
                {
                  "title": "🔧 Chore & CI",
                  "labels": ["chore", "ci", "Chore", "CI"]
                },
                {
                  "title": "📦 Other",
                  "labels": []
                }
              ],
              "label_extractor": [
                {
                  "pattern": "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\\([^\\)]*\\))?(!)?:[\\s\\S]*$",
                  "flags": "giu",
                  "target": "$1",
                  "on_property": "title"
                }
              ],
              "commit_template": "- #{{TITLE}} #{{MERGE_SHA}} @#{{AUTHOR}}",
              "sort": {
                "order": "DESC",
                "on_property": "mergedAt"
              }
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: step::sanitize_release_notes
        id: sanitized_changelog
        shell: bash
        run: |
          set -euo pipefail
          cat <<'EOF' > raw-changelog.md
          ${{ steps.changelog.outputs.changelog }}
          EOF

          perl -0pe 's{(?im)^- (?:build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(?:\([^)]+\))?(!)?:\s+}{- }g' raw-changelog.md > sanitized-changelog.md

          {
            echo 'body<<EOF'
            cat sanitized-changelog.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: step::create_or_update_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          body: ${{ steps.sanitized_changelog.outputs.body }}
          files: dist/*
