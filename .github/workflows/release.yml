name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  LINUX_PACKAGES: pkg-config libdbus-1-dev libasound2-dev libudev-dev libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libx11-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libegl1-mesa-dev libfontconfig1-dev libfreetype6-dev libglib2.0-dev
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  lint:
    name: Check And Clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Rust environment
        uses: ./.github/actions/rust-setup
        with:
          with-clippy: "true"
          linux-packages: ${{ env.LINUX_PACKAGES }}

      - name: Cargo check and clippy
        run: |
          cargo check -q --workspace
          cargo clippy --workspace --all-targets -- -D warnings

  build:
    needs: lint
    uses: ./.github/workflows/reusable-build.yml
    with:
      checkout_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      include_installers: true
      include_sha1: true

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ame-*
          path: dist
          merge-multiple: true

      - name: Resolve changelog range
        id: changelog_range
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          prev_tag="$(git for-each-ref --sort=-creatordate --format='%(refname:strip=2)' refs/tags | grep -vx "$RELEASE_TAG" | head -n1 || true)"
          if [ -n "$prev_tag" ]; then
            echo "from_ref=$prev_tag" >> "$GITHUB_OUTPUT"
          else
            root_commit="$(git rev-list --max-parents=0 "$RELEASE_TAG" | tail -n1)"
            echo "from_ref=$root_commit" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          mode: COMMIT
          toTag: ${{ env.RELEASE_TAG }}
          fromTag: ${{ steps.changelog_range.outputs.from_ref }}
          configurationJson: |
            {
              "template": "## What's Changed\n#{{CHANGELOG}}\n\n**Full Changelog**: #{{RELEASE_DIFF}}",
              "empty_template": "No significant changes.",
              "categories": [
                {
                  "title": "✨ Features",
                  "labels": ["feat", "Feat"]
                },
                {
                  "title": "🐛 Fixes",
                  "labels": ["fix", "Fix"]
                },
                {
                  "title": "♻️ Refactors",
                  "labels": ["refactor", "Refactor"]
                },
                {
                  "title": "⚡ Performance",
                  "labels": ["perf", "Perf"]
                },
                {
                  "title": "📝 Docs",
                  "labels": ["docs", "Docs"]
                },
                {
                  "title": "🔧 Chore & CI",
                  "labels": ["chore", "ci", "Chore", "CI"]
                },
                {
                  "title": "📦 Other",
                  "labels": []
                }
              ],
              "label_extractor": [
                {
                  "pattern": "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\\([^\\)]*\\))?(!)?:[\\s\\S]*$",
                  "flags": "giu",
                  "target": "$1",
                  "on_property": "title"
                }
              ],
              "commit_template": "- #{{TITLE}} #{{MERGE_SHA}} @#{{AUTHOR}}",
              "sort": {
                "order": "DESC",
                "on_property": "mergedAt"
              }
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: dist/*
