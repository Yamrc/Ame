name: Reusable Build

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: Optional git ref to checkout.
        required: false
        type: string
        default: ""
      include_installers:
        description: Build installer packages in addition to portable binaries.
        required: false
        type: boolean
        default: false
      upload_artifacts:
        description: Upload built artifacts.
        required: false
        type: boolean
        default: false
      artifact_prefix:
        description: Prefix used for uploaded artifact names.
        required: false
        type: string
        default: ame

permissions:
  contents: read

env:
  LINUX_PACKAGES: pkg-config libdbus-1-dev libasound2-dev libudev-dev libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libx11-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libegl1-mesa-dev libfontconfig1-dev libfreetype6-dev libglib2.0-dev

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux-x86_64
            bin_name: ame
            include_portable: true
            portable_name: ame-linux-x86_64
            installer_name: ame-linux-x86_64.deb
            installer_glob: ame-linux-x86_64.deb
          - os: windows-latest
            artifact_suffix: windows-x86_64
            bin_name: ame.exe
            include_portable: false
            portable_name: ame-windows-x86_64.exe
            installer_name: ame-windows-x86_64.msi
            installer_glob: ame-windows-x86_64.msi
          - os: macos-latest
            artifact_suffix: macos-arm64
            bin_name: ame
            include_portable: true
            portable_name: ame-macos-arm64
            installer_name: ame-macos-arm64.pkg
            installer_glob: ame-macos-arm64.pkg

    steps:
      - name: step::checkout
        if: inputs.checkout_ref == ''
        uses: actions/checkout@v6

      - name: step::checkout_specific_ref
        if: inputs.checkout_ref != ''
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: step::setup_rust
        uses: ./.github/actions/rust-setup
        with:
          linux-packages: ${{ env.LINUX_PACKAGES }}

      - name: step::build
        run: cargo build --release -p ame

      - name: step::resolve_app
        if: inputs.include_installers
        shell: pwsh
        run: |
          $version = ((cargo pkgid -p ame).Trim() -replace '.*@', '')
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: step::prepare_dist_directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

      - name: step::prepare_portable_package
        if: inputs.upload_artifacts && matrix.include_portable
        shell: pwsh
        run: |
          Copy-Item "target/release/${{ matrix.bin_name }}" "dist/${{ matrix.portable_name }}"

      - name: step::build_DEB_installer
        if: inputs.include_installers && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist/pkgroot
          mkdir -p dist/pkgroot/DEBIAN dist/pkgroot/usr/bin
          install -m 0755 target/release/ame dist/pkgroot/usr/bin/ame
          cat > dist/pkgroot/DEBIAN/control <<EOF
          Package: ame
          Version: ${APP_VERSION}
          Section: sound
          Priority: optional
          Architecture: amd64
          Maintainer: Yamrc <yamrci@outlook.com>
          Description: Ame music client
          EOF
          dpkg-deb --build dist/pkgroot "dist/${{ matrix.installer_name }}"

      - name: step::build_windows_installer
        if: inputs.include_installers && runner.os == 'Windows'
        shell: pwsh
        run: |
          function New-StableProductCode([string]$version) {
            $bytes = [System.Security.Cryptography.MD5]::HashData(
              [System.Text.Encoding]::UTF8.GetBytes("NeoNekos.Ame.WindowsMsi.$version.zh-cn.x64")
            )
            return ([Guid]::new($bytes)).ToString().ToUpperInvariant()
          }

          choco install wixtoolset --yes --no-progress
          $sourceExe = (Resolve-Path "target/release/ame.exe").Path
          $licenseText = Get-Content "LICENSE" -Raw
          $escapedLicense = $licenseText.Replace('\', '\\').Replace('{', '\{').Replace('}', '\}')
          $licenseBody = ($escapedLicense -split "`r?`n" | ForEach-Object { "$_\par" }) -join "`r`n"
          $licenseRtf = (Resolve-Path ".").Path + "\dist\MPL-2.0.rtf"
          $licenseContent = "{\rtf1\ansi\ansicpg1252\deff0{\fonttbl{\f0 Courier New;}}\viewkind4\uc1\pard\fs18`r`n$licenseBody`r`n}"
          Set-Content -Path $licenseRtf -Value $licenseContent -Encoding ascii
          $msiWixobj = "$env:RUNNER_TEMP/ame.msi.wixobj"
          $productCode = New-StableProductCode $env:APP_VERSION
          candle.exe -ext WixUIExtension -ext WixUtilExtension "-dSourceExe=$sourceExe" "-dProductCode=$productCode" "-dProductVersion=$env:APP_VERSION" "-dLicenseRtf=$licenseRtf" -out "$msiWixobj" "resouses/packaging/windows/ame.wxs"
          light.exe -ext WixUIExtension -ext WixUtilExtension -cultures:zh-cn -loc "resouses/packaging/windows/zh-cn.wxl" -out "dist/${{ matrix.installer_name }}" "$msiWixobj"

      - name: step::build_PKG_installer
        if: inputs.include_installers && runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist/pkgroot
          mkdir -p dist/pkgroot/usr/local/bin
          install -m 0755 target/release/ame dist/pkgroot/usr/local/bin/ame
          pkgbuild \
            --root dist/pkgroot \
            --identifier com.yamrc.ame \
            --version "${APP_VERSION}" \
            --install-location / \
            "dist/${{ matrix.installer_name }}"

      - name: step::upload_portable_artifact
        if: ${{ inputs.upload_artifacts && !inputs.include_installers && matrix.include_portable }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-${{ matrix.artifact_suffix }}
          path: dist/${{ matrix.portable_name }}
          if-no-files-found: error

      - name: step::upload_full_artifact_set
        if: ${{ inputs.upload_artifacts && inputs.include_installers && matrix.include_portable }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-${{ matrix.artifact_suffix }}
          path: |
            dist/${{ matrix.portable_name }}
            dist/${{ matrix.installer_glob }}
          if-no-files-found: error

      - name: step::upload_installer_only_artifact
        if: ${{ inputs.upload_artifacts && inputs.include_installers && !matrix.include_portable }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-${{ matrix.artifact_suffix }}
          path: dist/${{ matrix.installer_glob }}
          if-no-files-found: error
